[CTRL_HOSTS]
hosts = ["ctrl-test-1", "ctrl-test-2"]

[PATH:/tmp/purge-automation-lab/home:ctrl]
file_exclude = ["keep.json", "tool.py", ".*", "*.env", "env"]
file_cleanup_age_hours = 48
delete_dirs = false

[PATH:/tmp/purge-automation-lab/home:nonctrl]
file_exclude = ["tf_*.env", "tool.py", "cronjobs", ".*"]
file_cleanup_age_hours = 48
delete_dirs = false

[PATH:/tmp/purge-automation-lab/artifacts:nonctrl]
file_exclude = ["purge_config.cfg", "purge_runner.py", "README.md", "keep-*.sh"]
file_cleanup_age_hours = 48
delete_dirs = false

[PATH:/tmp/purge-automation-lab/jobs:nonctrl]
file_exclude = []
file_cleanup_age_hours = 48
delete_dirs = true
dir_exclude = ["scripts"]
del_dir_with_alpha = false
dir_delete_rules = {"3": 365, "4": 365, "other_digit_age": 30}

[PATH:/tmp/purge-automation-lab/jobs/scripts:nonctrl]
file_exclude = ["runner.sh", "diagnostics.sh", "upload_logs.sh"]
file_cleanup_age_hours = 48
delete_dirs = true
dir_exclude = ["stable", "shared", "templates"]
del_dir_with_alpha = true
dir_delete_rules = {"3": 7, "4": 7, "other_digit_age": 7, "alphanum_age": 7}
