[CTRL_HOSTS]
hosts = ["ctrl-1", "ctrl-3"]

[PATH:/tmp/purge-lab/home-oracle:ctrl]
file_exclude = ["service.json", "adwcli.py", ".*", "*.env", "env"]
file_cleanup_age_hours = 48
delete_dirs = false

[PATH:/tmp/purge-lab/adbadmin:nonctrl]
file_exclude = []
file_cleanup_age_hours = 48
delete_dirs = true
dir_exclude = ["scripts"]
del_dir_with_alpha = false
dir_delete_rules = {"3": 365, "4": 365, "other_digit_age": 30}
